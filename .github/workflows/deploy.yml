name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Build al
        run: npm run build

      - name: Sunucuya yükle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 147.93.93.31
          port: 65002
          username: u634914411
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "public_html"
          strip_components: 1
          rm: true
